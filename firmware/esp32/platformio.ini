[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_port  = COM4

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=0   ; serial vía CH343 UART (puerto izquierdo)
    -DARDUINO_USB_MODE=0          ; habilita USB OTG para HID (puerto derecho)

upload_port = COM4
